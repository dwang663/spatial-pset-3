<script type="module">
    import {get_default_lil_gui, ThreeEngine, refresh_displays} from "../js/utils/utils_three.js";
    const engine = ThreeEngine.new_default_3d();
    let gui = get_default_lil_gui();

    let settings = {
        w: 0.0,
        x: 0.0,
        y: 0.0,
        z: 0.0,
        size: 0.04
    }
    gui.add(settings, 'w', -2.0, 2.0).name('w');
    gui.add(settings, 'x', -2.0, 2.0).name('x');
    gui.add(settings, 'y', -2.0, 2.0).name('y');
    gui.add(settings, 'z', -2.0, 2.0).name('z');
    gui.add(settings, 'size', 0.01, 0.1).name('size');

    engine.animation_loop(() => {
        let origin = [0,0,0];
        let head = [settings.x, settings.y, settings.z];
        let tip = [settings.x, settings.y, settings.z+settings.w];
        let rev_tip = [settings.x, settings.y, settings.z-settings.w];
        engine.draw_debug_vector(origin, head, 0.01, 0.15, 0xff0000);
        engine.draw_debug_vector(head, tip, 0.01, 0.1, 0x00ff00);
        engine.draw_debug_vector(head, rev_tip, 0.01, 0.1, 0x0000ff);
        engine.draw_debug_sphere(tip, 0.05, 0xff0000);
    });
